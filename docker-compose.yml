services:
  frontend:
    container_name: team1-cokkiri-frontend
    image: team1-cokkiri-frontend:latest
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3111:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_BACKEND_URL=http://backend:8080
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - backend

  backend:
    container_name: team1-cokkiri-backend
    image: team1-cokkiri-backend:latest
    build: ./backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=${DB_URL:-jdbc:postgresql://db:5432/coliving}
      - DB_USERNAME=${DB_USERNAME:-coliving}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MOCK_IOT_URL=${MOCK_IOT_URL:-http://mock-iot:8000}
    depends_on:
      db: { condition: service_healthy }

  db:
    container_name: team1-cokkiri-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coliving
      POSTGRES_USER: ${DB_USERNAME:-coliving}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-coliving} -d coliving" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-iot:
    container_name: team1-cokkiri-mock-iot
    image: wiremock/wiremock:3.5.4
    restart: unless-stopped
    command: [ "--port", "8000" ]
    expose:
      - "8000"
    volumes:
      - ./mock-iot/mappings:/home/wiremock/mappings

volumes:
  postgres-data:
    name: team1-cokkiri-pg-data
