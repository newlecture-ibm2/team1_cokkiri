services:
  frontend:
    container_name: team1-cokkiri-frontend
    image: team1-cokkiri-frontend:latest
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_PORTONE_STORE_ID=store-4d66fd44-b28d-47c6-bed8-f660be2ff078
        - NEXT_PUBLIC_PORTONE_CHANNEL_KEY=channel-key-8232248b-51b5-464e-b9df-6cebd3be3402
    restart: unless-stopped
    ports:
      - "3111:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_BACKEND_URL=http://backend:8080
      - INTERNAL_FRONTEND_URL=http://frontend:3000
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - NEXT_PUBLIC_PORTONE_STORE_ID=store-4d66fd44-b28d-47c6-bed8-f660be2ff078
      - NEXT_PUBLIC_PORTONE_CHANNEL_KEY=channel-key-8232248b-51b5-464e-b9df-6cebd3be3402
    depends_on:
      - backend
    # 👇 프론트엔드 Watch 설정 추가
    develop:
      watch:
        # 소스 코드가 바뀌면 컨테이너 내부로 파일만 즉시 동기화 (Hot Reloading 적용)
        - action: sync
          path: ./frontend/src
          target: /app/src # ⚠️ 프론트엔드 Dockerfile의 WORKDIR 경로에 맞춰 수정하세요 (보통 /app)
        - action: sync
          path: ./frontend/public
          target: /app/public
        # 패키지가 변경되면 이미지를 다시 빌드
        - action: rebuild
          path: ./frontend/package.json

  backend:
    container_name: team1-cokkiri-backend
    image: team1-cokkiri-backend:latest
    build: ./backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=${DB_URL:-jdbc:postgresql://db:5432/coliving}
      - DB_USERNAME=${DB_USERNAME:-coliving}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - JWT_SECRET=${JWT_SECRET}
      - MOCK_IOT_URL=${MOCK_IOT_URL:-http://mock-iot:8000}
      - APP_UPLOAD_DIR=${APP_UPLOAD_DIR:-/var/lib/cokkiri/uploads}
      - APP_DEMO_DATA_ENABLED=${APP_DEMO_DATA_ENABLED:-true}
    volumes:
      - uploads-data:/var/lib/cokkiri/uploads
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    # 👇 백엔드 Watch 설정 추가
    develop:
      watch:
        # Java 코드가 바뀌면 파일을 동기화하고 컨테이너를 빠르게 재시작
        - action: sync+restart
          path: ./backend/src
          target: /app/src # ⚠️ 백엔드 Dockerfile의 WORKDIR 경로에 맞춰 수정하세요 (예: /app, /workspace)
        # 의존성이 변경되면 이미지를 다시 빌드
        - action: rebuild
          path: ./backend/build.gradle # Maven을 사용한다면 pom.xml로 변경하세요

  db:
    container_name: team1-cokkiri-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: coliving
      POSTGRES_USER: ${DB_USERNAME:-coliving}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-coliving} -d coliving" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-iot:
    container_name: team1-cokkiri-mock-iot
    image: wiremock/wiremock:3.5.4
    restart: unless-stopped
    command: [ "--port", "8000" ]
    expose:
      - "8000"
    volumes:
      # 이미 볼륨 마운트가 되어 있어 호스트에서 수정 시 즉시 반영됩니다.
      - ./mock-iot/mappings:/home/wiremock/mappings

  redis:
    container_name: team1-cokkiri-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: team1-cokkiri-pg-data
  uploads-data:
    name: team1-cokkiri-uploads-data
