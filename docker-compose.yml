services:
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3111:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=/api
  #     - INTERNAL_BACKEND_URL=http://backend:8080
  #   depends_on:
  #     - backend

  backend:
    build: ./backend
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://db:5432/coliving
      - DB_USERNAME=coliving
      - DB_PASSWORD=coliving123
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-minimum-32-characters-long!!}
      - MOCK_IOT_URL=http://mock-iot:8080
    depends_on:
      db: { condition: service_healthy }

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coliving
      POSTGRES_USER: coliving
      POSTGRES_PASSWORD: coliving123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coliving -d coliving"]
      interval: 5s

  mock-iot:
    image: wiremock/wiremock:3.5.4
    volumes:
      - ./mock-iot/mappings:/home/wiremock/mappings

volumes:
  postgres-data:
