app:
  demo-data:
    enabled: true

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://db:5432/coliving}
    username: ${DB_USERNAME:coliving}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  jpa:
    show-sql: false
    hibernate:
      # 마이그레이션 도구 미사용 → Entity 변경 시 스키마 자동 반영
      ddl-auto: update
  sql.init.mode: never

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000       # 30분
  refresh-expiration: 604800000    # 7일

oauth2:
  success-url: http://localhost:3111/login/oauth2-success
  failure-url: http://localhost:3111/login?error=oauth2_failure
mock-iot:
  base-url: ${MOCK_IOT_URL:http://mock-iot:8000}

logging:
  level:
    com.coliving: INFO
    org.hibernate.SQL: WARN

