spring:
  profiles.active: dev
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
    properties.hibernate.format_sql: true
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 50MB

server:
  port: 8080

springdoc:
  swagger-ui.path: /swagger-ui.html
