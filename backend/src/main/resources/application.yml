app:
  demo-data:
    enabled: false
  upload:
    # 업로드 파일 루트 경로 (community/voc 하위 폴더는 코드에서 추가)
    dir: data/uploads
  community:
    view-sync-ms: 10000

spring:
  profiles.active: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1500ms
  jpa:
    # 마이그레이션 도구(Flyway 등) 미사용 → JPA Entity가 스키마를 직접 관리
    # update: 엔티티 변경 시 컬럼/테이블 자동 추가 (삭제는 안 함)
    # 운영 환경에서 마이그레이션 도구를 도입하면 validate로 전환 권장
    hibernate.ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  jackson:
    time-zone: Asia/Seoul
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-client-secret}
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dummy-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dummy-kakao-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 50MB

server:
  port: 8080
  forward-headers-strategy: framework

mock-iot:
  base-url: ${MOCK_IOT_URL:http://mock-iot:8000}

springdoc:
  swagger-ui.path: /swagger-ui.html
