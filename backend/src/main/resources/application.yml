app:
  demo-data:
    enabled: false

spring:
  profiles.active: dev
  jpa:
    # 마이그레이션 도구(Flyway 등) 미사용 → JPA Entity가 스키마를 직접 관리
    # update: 엔티티 변경 시 컬럼/테이블 자동 추가 (삭제는 안 함)
    # 운영 환경에서 마이그레이션 도구를 도입하면 validate로 전환 권장
    hibernate.ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 50MB

server:
  port: 8080

springdoc:
  swagger-ui.path: /swagger-ui.html
