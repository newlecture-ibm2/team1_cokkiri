app:
  demo-data:
    enabled: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coliving
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:coliving}
    password: ${DB_PASSWORD:coliving1234}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: 4de1f2a3c9b78e5d614088a2c5b7c8d9e0f12a3b4c5d6e7f8a9b0c1d2e3f4a5b
  access-expiration: 1800000
  refresh-expiration: 604800000

oauth2:
  success-url: http://localhost:3000/login/oauth2-success
  failure-url: http://localhost:3000/login?error=oauth2_failure

mock-iot:
  # 로컬 환경에서는 Docker 네트워크(mock-iot)가 아닌 localhost로 접근
  base-url: http://localhost:8000

logging:
  level:
    com.coliving: DEBUG
    org.hibernate.SQL: DEBUG
