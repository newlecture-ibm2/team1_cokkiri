app:
  demo-data:
    enabled: false
  upload:
    dir: ${APP_UPLOAD_DIR:/var/lib/cokkiri/uploads}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  jpa.show-sql: false
  sql.init.mode: never

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXP:1800000}      # 30분
  refresh-expiration: ${JWT_REFRESH_EXP:604800000}   # 7일

mock-iot:
  base-url: ${MOCK_IOT_URL:http://mock-iot:8000}

logging:
  level:
    com.coliving: INFO
