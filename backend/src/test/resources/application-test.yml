# Slice / smoke tests: no external PostgreSQL required (CI / local without Docker DB).
spring:
  datasource:
    url: jdbc:h2:mem:coliving_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
      hibernate:
        default_batch_fetch_size: 16
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: dummy
            client-secret: dummy
            scope: profile,email
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
          naver:
            client-id: dummy
            client-secret: dummy
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
          kakao:
            client-id: dummy
            client-secret: dummy
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: test-secret-key-minimum-32-characters-long!!
  access-expiration: 1800000
  refresh-expiration: 604800000

mock-iot:
  base-url: http://localhost:9999
